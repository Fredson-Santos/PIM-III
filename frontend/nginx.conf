server {
    listen 80;
    server_name _;

    # Direcionar todas as requisições de API para o container backend
    location /api {
        proxy_pass http://backend:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'keep-alive';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Servir os arquivos estáticos do frontend
    location / {
        root /usr/share/nginx/html;
        # Se acessar a raiz, redireciona para o login
        if ($request_uri = "/") {
            return 301 /pages/tela-login.html;
        }
        # Tenta servir o arquivo, senão retorna 404
        try_files $uri =404;
    }

    # Configuração de compressão Gzip para melhor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
