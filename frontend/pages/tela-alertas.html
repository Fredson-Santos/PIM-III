<main class="main" role="main">

    <div class="topbar-left">
      <h1>Central de Alertas</h1>
      <p>Acompanhe eventos importantes sobre seu orçamento</p>
    </div>
    <div class="topbar-right">
      <!-- <button class="btn-logout-top" onclick="AuthService.logout()" aria-label="Sair do sistema" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button> -->
    </div>
  </header>

  <nav class="toolbar" aria-label="Filtros de alertas">
    <button class="filter-btn active" aria-pressed="true">Todos (4)</button>
    <button class="filter-btn" aria-pressed="false">Não lidos (2)</button>
    <button class="filter-btn" aria-label="Marcar todos os alertas como lidos">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Marcar todos como lidos
    </button>
  </nav>

  <section class="alerts-list" id="alertsList" aria-labelledby="alerts-list-title">
    <h2 id="alerts-list-title" class="sr-only">Lista de notificações recentes</h2>
    <!-- Dynamic Alerts -->
  </section>

</main>

<script src="../js/api.js"></script>
<script>
  const alertsList = document.getElementById('alertsList');

  async function loadAlerts() {
    Utils.showLoading('alertsList');
    try {
      const alerts = await AlertService.getAll();
      
      if (alerts.length === 0) {
        alertsList.innerHTML = '<p style="text-align:center;color:var(--text-muted)">Nenhum alerta no momento.</p>';
        return;
      }

      alertsList.innerHTML = alerts.map(a => {
        let typeClass = 'alert-info';
        let iconHtml = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
        let typeLabel = 'Informação';
        
        if (a.type === 'orcamento_excedido') {
          typeClass = 'alert-danger';
          typeLabel = 'Crítico';
          iconHtml = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
        } else if (a.type === 'categoria_limite') {
          typeClass = 'alert-warning';
          typeLabel = 'Aviso';
          iconHtml = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        }

        const unreadClass = a.isRead ? '' : 'unread';
        const ariaLabel = `${typeLabel}: ${sanitizeHtml(a.title)}. ${sanitizeHtml(a.message)}`;

        return `
          <article class="alert-card ${typeClass} ${unreadClass}" aria-label="${ariaLabel}">
            <div class="alert-icon" aria-hidden="true">${iconHtml}</div>
            <div class="alert-content">
              <div class="alert-header">
                <div class="alert-title">${a.title}</div>
                <time class="alert-time" datetime="${a.createdAt}">${Utils.formatDate(a.createdAt)}</time>
              </div>
              <div class="alert-message">${a.message}</div>
              <div class="alert-actions">
                ${!a.isRead ? `<button class="btn-action btn-read" onclick="markAlertRead(${a.id})" aria-label="Marcar alerta ${a.title} como lido"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg> Marcar como lido</button>` : ''}
                <button class="btn-action btn-del" onclick="deleteAlert(${a.id})" aria-label="Excluir alerta ${a.title}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg> Excluir</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    } catch (err) {
      alertsList.innerHTML = '<p style="color:red">Erro ao carregar alertas.</p>';
    }
  }

  async function markAlertRead(id) {
    try {
      await AlertService.markAsRead(id);
      loadAlerts();
    } catch (err) {}
  }

  async function deleteAlert(id) {
    if(confirm('Excluir este alerta?')) {
      try {
        await AlertService.delete(id);
        loadAlerts();
      } catch (err) {}
    }
  }

  loadAlerts();
</script>
</body>
</html>
