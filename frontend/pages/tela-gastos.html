<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConektaFinance — Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/global.css">
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#27500A" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
      </svg>
    </div>
    <span class="logo-name">ConektaFinance</span>
  </div>

  <span class="nav-label">Principal</span>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </a>
  <a class="nav-item active" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Gastos
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
    Categorias
  </a>

  <span class="nav-label">Análise</span>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    Relatórios
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Alertas
  </a>
  <a class="nav-item" href="#">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3"/></svg>
    IA Simulada
  </a>

  <div class="sidebar-bottom">
    <div class="user-pill">
      <div class="avatar">JS</div>
      <div class="user-info">
        <div class="name">João Silva</div>
        <div class="role">Conta pessoal</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Gastos</h1>
      <p>24 lançamentos em maio 2025</p>
    </div>
    <button class="btn-add">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo gasto
    </button>
  </div>

  <div class="content-grid">
    <div>
      <div class="expenses-card">
        <div class="expenses-toolbar">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar gasto...">
          </div>
          <button class="filter-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            Filtrar
          </button>
          <button class="filter-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Maio 2025
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Data</th>
              <th style="text-align:right">Valor</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="expensesTableBody">
            <!-- Dynamically populated -->

          </tbody>
        </table>
        <div class="pagination">
          <span class="pagination-info">Mostrando 6 de 24 registros</span>
          <div class="pagination-btns">
            <button class="page-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
        </div>
      </div>
    </div>

    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="expenseModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-content">
    <button class="modal-close" id="closeModalBtn" aria-label="Fechar modal">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-header">
      <h3 id="modalTitle">Registrar gasto</h3>
    </div>

    <div class="field">
      <label>Valor</label>
      <div class="amount-field">
        <span class="prefix">R$</span>
        <input type="number" placeholder="0,00" id="expenseValue">
      </div>
    </div>

    <div class="field">
      <label>Descrição</label>
      <input type="text" placeholder="Ex: Supermercado, Uber..." id="expenseDesc">
    </div>

    <div class="row-two">
      <div class="field">
        <label>Categoria</label>
        <select id="expenseCategory">
          <option>Alimentação</option>
          <option>Transporte</option>
          <option>Lazer</option>
          <option>Saúde</option>
          <option>Moradia</option>
        </select>
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" value="2025-05-12" id="expenseDate">
      </div>
    </div>

    <div class="field">
      <label>Observação (opcional)</label>
      <textarea placeholder="Detalhes adicionais..." id="expenseObs"></textarea>
    </div>

    <div class="form-divider"></div>

    <div style="margin-bottom:1.2rem">
      <div class="recurrence">
        <label class="toggle">
          <input type="checkbox" id="expenseRecurrent">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Gasto recorrente (mensal)</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="cancelModalBtn">Cancelar</button>
      <button class="btn-primary" id="saveExpenseBtn">Salvar gasto</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // DOM Elements
  const modal = document.getElementById('expenseModal');
  const btnAdd = document.querySelector('.btn-add');
  const btnClose = document.getElementById('closeModalBtn');
  const btnCancel = document.getElementById('cancelModalBtn');
  const btnSave = document.getElementById('saveExpenseBtn');
  const modalTitle = document.getElementById('modalTitle');
  const tbody = document.getElementById('expensesTableBody');
  const selectCategory = document.getElementById('expenseCategory');

  // Form inputs
  const inputId = document.createElement('input'); inputId.type = 'hidden'; inputId.id = 'expenseId'; document.querySelector('.modal-content').appendChild(inputId);
  const inputValue = document.getElementById('expenseValue');
  const inputDesc = document.getElementById('expenseDesc');
  const inputDate = document.getElementById('expenseDate');
  const inputObs = document.getElementById('expenseObs');
  const inputRecurrent = document.getElementById('expenseRecurrent');

  let categoriesCache = [];

  // Initialize
  async function init() {
    Utils.showLoading('expensesTableBody');
    try {
      await loadCategories();
      await loadExpenses();
    } catch (err) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Erro ao carregar dados.</td></tr>';
    }
  }

  async function loadCategories() {
    categoriesCache = await CategoryService.getAll();
    selectCategory.innerHTML = categoriesCache.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  }

  async function loadExpenses() {
    const expenses = await ExpenseService.getAll();
    tbody.innerHTML = expenses.map(e => {
      const cat = categoriesCache.find(c => c.id === e.categoryId);
      // fallback colors
      let badgeClass = 'cat-housing';
      if(cat && cat.colorHex) badgeClass = ''; 
      
      return `
      <tr>
        <td data-label="Descrição"><strong style="font-weight:500">${e.description}</strong><br><span style="font-size:11px;color:var(--text-muted)">${e.observation || ''}</span></td>
        <td data-label="Categoria">
          ${cat ? `<span class="cat-badge" style="background:${cat.colorHex}22; color:${cat.colorHex}">${cat.name}</span>` : `<span class="cat-badge cat-housing">Sem Categoria</span>`}
        </td>
        <td data-label="Data" style="color:var(--text-muted)">${Utils.formatDate(e.date)}</td>
        <td data-label="Valor" class="amount" style="text-align:right">−${Utils.formatCurrency(e.amount)}</td>
        <td>
          <div class="actions">
            <button class="action-btn edit" onclick="editExpense(${e.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="action-btn" onclick="deleteExpense(${e.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
          </div>
        </td>
      </tr>
    `}).join('');
    
    if(expenses.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Nenhum gasto registrado.</td></tr>';
    }
  }

  // Modal Logic
  function openModal(isEdit = false) {
    modalTitle.textContent = isEdit ? 'Editar gasto' : 'Registrar gasto';
    modal.style.display = 'flex';
    modal.offsetHeight;
    modal.classList.add('active');
    inputValue.focus();
  }

  function closeModal() {
    modal.classList.remove('active');
    setTimeout(() => { modal.style.display = 'none'; clearForm(); }, 200);
  }

  function clearForm() {
    inputId.value = '';
    inputValue.value = '';
    inputDesc.value = '';
    inputDate.value = new Date().toISOString().split('T')[0];
    inputObs.value = '';
    inputRecurrent.checked = false;
  }

  async function editExpense(id) {
    try {
      const expense = await ExpenseService.getById(id);
      inputId.value = expense.id;
      inputValue.value = expense.amount;
      inputDesc.value = expense.description;
      selectCategory.value = expense.categoryId;
      inputDate.value = expense.date.split('T')[0];
      inputObs.value = expense.observation || '';
      inputRecurrent.checked = expense.isRecurrent;
      openModal(true);
    } catch (err) {}
  }

  async function deleteExpense(id) {
    if(confirm('Tem certeza que deseja excluir este gasto?')) {
      try {
        await ExpenseService.delete(id);
        showToast('Gasto excluído com sucesso!');
        loadExpenses();
      } catch (err) {}
    }
  }

  btnSave.addEventListener('click', async () => {
    // Validação client-side
    if(!inputValue.value || !inputDesc.value || !selectCategory.value) {
      showToast('Preencha os campos obrigatórios (Valor, Descrição, Categoria)', 'error');
      return;
    }

    const payload = {
      amount: parseFloat(inputValue.value),
      description: inputDesc.value,
      categoryId: parseInt(selectCategory.value),
      date: new Date(inputDate.value).toISOString(),
      observation: inputObs.value,
      isRecurrent: inputRecurrent.checked
    };

    const id = inputId.value;
    const oldBtnText = btnSave.textContent;
    btnSave.textContent = 'Salvando...';
    btnSave.disabled = true;

    try {
      if(id) {
        await ExpenseService.update(id, payload);
        showToast('Gasto atualizado com sucesso!');
      } else {
        await ExpenseService.create(payload);
        showToast('Gasto registrado com sucesso!');
      }
      closeModal();
      loadExpenses();
    } catch (err) {
    } finally {
      btnSave.textContent = oldBtnText;
      btnSave.disabled = false;
    }
  });

  btnAdd.addEventListener('click', () => { clearForm(); openModal(false); });
  btnClose.addEventListener('click', closeModal);
  btnCancel.addEventListener('click', closeModal);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  // Start app
  init();
</script>

</body>
</html>
